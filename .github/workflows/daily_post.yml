name: HALHAFARM Daily Facebook Posts

on:
  schedule:
    - cron: '0 8 * * *'    # 9:00 Morocco (UTC+1) - morning set
    - cron: '0 17 * * *'   # 18:00 Morocco (UTC+1) - evening set
  workflow_dispatch:
    inputs:
      session:
        description: 'morning or evening'
        default: 'morning'

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect session
        id: session
        run: |
          HOUR=$(date -u +%H)
          INPUT="${{ github.event.inputs.session }}"
          if [ "$INPUT" = "evening" ] || [ "$HOUR" = "17" ]; then
            echo "session=evening" >> $GITHUB_OUTPUT
          else
            echo "session=morning" >> $GITHUB_OUTPUT
          fi

      - name: Post video to Facebook
        env:
          FB_USER_TOKEN: ${{ secrets.FB_USER_TOKEN }}
          FB_PAGE_ID: "114437705015500"
          SESSION: ${{ steps.session.outputs.session }}
        run: python post.py

      - name: Save state
        run: |
          git config user.name "HALHAFARM Bot"
          git config user.email "bot@halhafarm.com"
          git add state.json state_evening.json
          git diff --staged --quiet || git commit -m "state: update after post"
          git push
